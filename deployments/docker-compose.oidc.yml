# Docker Compose OIDC overlay — uses the shared Keycloak from terraform-registry-frontend
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up -d
#
# PREREQUISITES:
#   1. The terraform-registry-frontend OIDC stack must be running first:
#        cd ../terraform-registry-frontend/deployments
#        docker compose -f docker-compose.yml -f docker-compose.oidc.yml up -d
#      This starts Keycloak with both the "terraform-registry" and
#      "terraform-state-manager" realms pre-loaded.
#
#   2. The shared network must exist (one-time setup):
#        docker network create shared-keycloak
#
#   3. Hosts file entry required (same as registry):
#        127.0.0.1  registry.local keycloak
#
# Keycloak admin console:        http://keycloak:8180/admin  (admin / admin)
# State manager realm discovery: http://keycloak:8180/realms/terraform-state-manager/.well-known/openid-configuration
#
# Test users (password for all: TestPass123!):
#   admin.user   alice.analyst   bob.operator   carol.viewer

services:
  backend:
    # No depends_on for keycloak — it lives in the registry stack.
    # restart: unless-stopped (inherited from base) handles the case where the
    # backend starts before the registry's Keycloak is healthy.
    environment:
      # Enable OIDC authentication
      TSM_AUTH_OIDC_ENABLED: "true"

      # Keycloak is provided by the registry stack, reachable via the
      # "shared-keycloak" Docker network using the same hostname.
      TSM_AUTH_OIDC_ISSUER_URL: "http://keycloak:8180/realms/terraform-state-manager"
      TSM_AUTH_OIDC_CLIENT_ID: "terraform-state-manager"
      TSM_AUTH_OIDC_CLIENT_SECRET: "terraform-state-manager-secret"

      # Callback URL — must match redirectUris in tsm-realm-export.json.
      TSM_AUTH_OIDC_REDIRECT_URL: "http://localhost:3001/api/v1/auth/callback"

      # Public URL tells the backend where the browser-facing frontend lives.
      TSM_SERVER_PUBLIC_URL: "http://localhost:3001"
    networks:
      - shared-keycloak

  # One-shot service that seeds the database after the backend has applied its migrations.
  # Marks setup as complete (no wizard needed — OIDC configured via env vars) and
  # pre-provisions admin@example.com (Keycloak's admin.user) as a TSM admin.
  # Runs every time the stack starts but the SQL is idempotent (ON CONFLICT DO NOTHING/UPDATE).
  db-seed:
    image: postgres:16-alpine
    container_name: tsm-db-seed
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: tsm
      PGUSER: tsm
      PGPASSWORD: ${POSTGRES_PASSWORD:-tsm}
    volumes:
      - ./keycloak/seed-oidc-dev.sql:/seed.sql:ro
    command: psql -f /seed.sql
    networks:
      - tsm-network
    restart: "no"

networks:
  # Shared external network — provides access to the registry stack's Keycloak
  # container via the "keycloak" Docker DNS name.
  # Create once with: docker network create shared-keycloak
  shared-keycloak:
    external: true
